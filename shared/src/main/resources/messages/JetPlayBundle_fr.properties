# Errors
error.unknown=Erreur inconnue
error.empty=Le flux multimédia était vide. Le fichier n'a pas pu être lu depuis l'hôte.
error.download={0}
error.transcoding.message=Le transcodage n'est pas disponible — les bibliothèques FFmpeg intégrées n'ont pas pu être chargées. Veuillez réinstaller le plugin. Les fichiers aux formats natifs (.webm, .ogg, .mp3, .wav) peuvent toujours être lus.
error.transcoding.notification.title=JetPlay : Transcodage indisponible
error.transcoding.notification.content=Les fichiers {0} nécessitent un transcodage pour la lecture, mais les bibliothèques FFmpeg intégrées n'ont pas pu être chargées. Veuillez réinstaller le plugin.
