# Errors
error.unknown=未知錯誤
error.empty=媒體串流為空。無法從主機讀取檔案。
error.download={0}
error.transcoding.message=轉碼不可用——內建的 FFmpeg 函式庫載入失敗。請嘗試重新安裝外掛程式。原生格式的檔案（.webm、.ogg、.mp3、.wav）仍可正常播放。
error.transcoding.notification.title=JetPlay：轉碼不可用
error.transcoding.notification.content={0} 檔案需要轉碼才能播放，但內建的 FFmpeg 函式庫載入失敗。請嘗試重新安裝外掛程式。
error.jcef.unavailable=媒體播放需要內嵌瀏覽器 (JCEF)，但此 IDE 中不可用。請切換到已啟用 JCEF 的 JetBrains Runtime 以播放媒體。
error.load.timeout=無法開始播放。媒體串流始終未到達播放器。這是遠端開發的已知限制——請改為在本機 IDE 中開啟該檔案。

