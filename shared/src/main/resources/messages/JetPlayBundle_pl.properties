# Transcoding
transcoding.reason={0} używa kodeków nieobsługiwanych natywnie przez wbudowaną przeglądarkę. Konwertowanie do WebM (VP9/Opus) w celu odtworzenia.

# Errors
error.unknown=Nieznany błąd
error.empty=Strumień multimedialny był pusty. Nie udało się odczytać pliku z hosta.
error.download={0}
error.transcoding.message=Transkodowanie niedostępne — nie udało się załadować dołączonych bibliotek FFmpeg. Spróbuj ponownie zainstalować wtyczkę. Pliki w natywnych formatach (.webm, .ogg, .mp3, .wav) nadal będą odtwarzane.
error.transcoding.notification.title=JetPlay: Transkodowanie niedostępne
error.transcoding.notification.content=Pliki {0} wymagają transkodowania do odtwarzania, ale nie udało się załadować dołączonych bibliotek FFmpeg. Spróbuj ponownie zainstalować wtyczkę.
error.jcef.unavailable=Odtwarzanie multimediów wymaga wbudowanej przeglądarki (JCEF), która jest niedostępna w tym IDE. Przełącz się na środowisko JetBrains Runtime z włączonym JCEF, aby odtwarzać multimedia.
error.load.timeout=Nie można rozpocząć odtwarzania. Strumień multimedialny nigdy nie dotarł do odtwarzacza. To znane ograniczenie pracy zdalnej — spróbuj zamiast tego otworzyć plik w lokalnym IDE.

