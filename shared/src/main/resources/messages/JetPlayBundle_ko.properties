# Editor
editor.name=미디어 플레이어

# File type
filetype.name=미디어
filetype.description=미디어 파일 (오디오/비디오)


# Transcoding
transcoding.reason={0}은(는) 내장 브라우저가 기본적으로 지원하지 않는 코덱을 사용합니다. 재생을 위해 WebM (VP9/Opus)으로 변환 중입니다.

# Errors
error.unknown=알 수 없는 오류
error.empty=미디어 스트림이 비어 있습니다. 호스트에서 파일을 읽을 수 없습니다.
error.download={0}
error.transcoding.message=트랜스코딩을 사용할 수 없습니다 — 번들된 FFmpeg 라이브러리를 로드하지 못했습니다. 플러그인을 다시 설치해 보세요. 네이티브 형식의 파일(.webm, .ogg, .mp3, .wav)은 계속 재생할 수 있습니다.
error.transcoding.notification.title=JetPlay: 트랜스코딩 사용 불가
error.transcoding.notification.content={0} 파일을 재생하려면 트랜스코딩이 필요하지만, 번들된 FFmpeg 라이브러리를 로드하지 못했습니다. 플러그인을 다시 설치해 보세요.
error.jcef.unavailable=미디어 재생에는 내장 브라우저(JCEF)가 필요하지만 이 IDE에서는 사용할 수 없습니다. 미디어를 재생하려면 JCEF가 활성화된 JetBrains Runtime으로 전환하세요.
error.load.timeout=재생을 시작할 수 없습니다. 미디어 스트림이 플레이어에 도달하지 못했습니다. 이는 원격 개발의 알려진 제한 사항입니다 — 대신 로컬 IDE에서 파일을 열어 보세요.

# UI
ui.transcoding.label=재생을 위해 변환 중\u2026
ui.transcoding.tip=.webm, .ogg, .opus, .wav 또는 .mp3 파일을 사용하면 변환 없이 바로 재생할 수 있습니다.
ui.error.title=이 파일을 재생할 수 없습니다

# Actions
action.report.issue=문제 보고

