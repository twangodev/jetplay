notification.star.title=JetPlay은 오픈 소스입니다
notification.star.content=별점이나 피드백을 주시면 감사하겠습니다!
action.star.github=GitHub에서 별 누르기
action.star.feedback=피드백 보내기
action.star.dismiss=다시 표시 안 함
