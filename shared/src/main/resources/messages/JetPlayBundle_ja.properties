# Editor
editor.name=メディアプレーヤー

# File type
filetype.name=メディア
filetype.description=メディアファイル（音声/動画）


# Transcoding
transcoding.reason={0} は内蔵ブラウザーがネイティブにサポートしていないコーデックを使用しています。再生のために WebM (VP9/Opus) に変換しています。

# Errors
error.unknown=不明なエラー
error.empty=メディアストリームが空でした。ホストからファイルを読み取れませんでした。
error.download={0}
error.transcoding.message=トランスコードが利用できません — バンドルされた FFmpeg ライブラリの読み込みに失敗しました。プラグインを再インストールしてください。ネイティブ形式のファイル（.webm、.ogg、.mp3、.wav）は引き続き再生できます。
error.transcoding.notification.title=JetPlay: トランスコード利用不可
error.transcoding.notification.content={0} ファイルの再生にはトランスコードが必要ですが、バンドルされた FFmpeg ライブラリの読み込みに失敗しました。プラグインを再インストールしてください。
error.jcef.unavailable=メディアの再生には内蔵ブラウザー (JCEF) が必要ですが、この IDE では利用できません。メディアを再生するには、JCEF が有効な JetBrains Runtime に切り替えてください。
error.load.timeout=再生を開始できませんでした。メディアストリームがプレーヤーに届きませんでした。これはリモート開発の既知の制限です — 代わりにローカル IDE でファイルを開いてみてください。

# UI
ui.transcoding.label=再生用に変換中\u2026
ui.transcoding.tip=.webm、.ogg、.opus、.wav、.mp3 ファイルは変換なしですぐに再生できます。
ui.error.title=このファイルを再生できません

